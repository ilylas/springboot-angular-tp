name: CI/CD Spring Boot Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-push-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      #- name: Make Maven wrapper executable
        #run: chmod +x ./springboot/app/mvnw

      #- name: Build Spring Boot JAR
        #run: |
          #./springboot/app/mvnw clean package -DskipTests

      - name: Build backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-app ./springboot/app

      - name: Build frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

      - name: Run application with Docker Compose
        run: |
          docker-compose up -d
          sleep 30
          docker ps

      - name: Check containers status
        run: |
          docker-compose ps
